# https://docs.codecov.com/docs/codecov-yaml

codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "60...90"

  status:
    project:
      default:
        target: 80%
        threshold: 1%
        informational: true
    patch:
      default:
        target: 80%
        informational: true

ignore:
  - "**/tests/**"
  - "**/conftest.py"
  - "tests/"
  - "src/benchmarking/"
  - "src/tuning/"
  - "src/analysis/"
  - "src/scripts/"
  - "**/*.ipynb"
  - "docs/"
  # One-off diagnostic / error-analysis CLIs — never imported by production
  # paths, not worth the maintenance burden of full-coverage tests. Gated
  # behind `if __name__ == "__main__"` and invoked manually when debugging
  # regressions; keeping them out of the coverage denominator lets the 80%
  # project target reflect production code.
  - "src/QB/diagnose_qb_outliers.py"
  - "src/RB/analyze_rb_errors.py"
  - "src/WR/benchmark_ridge_variants.py"
  # Note: src/training/trainer.py, src/evaluation/backtest.py, and
  # src/data/preprocessing.py were previously ignored as "dead/one-off"
  # but now have direct test coverage (97-100%) — keep them in the
  # coverage denominator for the Src component.

comment:
  layout: "reach, diff, flags, components, files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

flag_management:
  default_rules:
    carryforward: true
    statuses:
      - type: project
        target: 80%
        informational: true
  individual_flags:
    - name: QB
      paths: [src/QB/]
    - name: RB
      paths: [src/RB/]
    - name: WR
      paths: [src/WR/]
    - name: TE
      paths: [src/TE/]
    - name: K
      paths: [src/K/]
    - name: DST
      paths: [src/DST/]
    - name: shared
      paths: [src/shared/, src/config.py, src/data/, src/features/, src/models/, src/training/, src/evaluation/, src/serving/, src/batch/]

component_management:
  default_rules:
    statuses:
      - type: project
        target: 80%
        informational: true
  individual_components:
    - component_id: qb
      name: QB
      paths: ["src/QB/**"]
    - component_id: rb
      name: RB
      paths: ["src/RB/**"]
    - component_id: wr
      name: WR
      paths: ["src/WR/**"]
    - component_id: te
      name: TE
      paths: ["src/TE/**"]
    - component_id: k
      name: K
      paths: ["src/K/**"]
    - component_id: dst
      name: DST
      paths: ["src/DST/**"]
    - component_id: shared
      name: Shared
      paths: ["src/shared/**"]
    - component_id: src
      name: Src
      paths: ["src/**"]
    - component_id: batch
      name: Batch
      paths: ["src/batch/**"]
    - component_id: app
      name: App
      paths: ["src/serving/app.py"]
