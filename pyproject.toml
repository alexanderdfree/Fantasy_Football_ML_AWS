[tool.pytest.ini_options]
markers = [
    "unit: fast unit tests (<1s each)",
    "integration: multi-component tests (<10s)",
    "e2e: full-pipeline tests (<60s)",
    "regression: model quality thresholds",
    "slow: excluded from default run",
]
timeout = 60
timeout_method = "thread"
addopts = "--strict-markers -n auto --dist=loadfile"
filterwarnings = [
    # mord 0.7 calls scipy's L-BFGS-B with disp/iprint kwargs that scipy 1.17
    # marked for removal in 1.18. Upstream fix pending; silence to keep test
    # output clean.
    "ignore:.*L-BFGS-B solver are deprecated:DeprecationWarning",
]
testpaths = [
    "tests",
    "QB/tests",
    "RB/tests",
    "WR/tests",
    "TE/tests",
    "K/tests",
    "DST/tests",
    "batch/tests",
    "shared/tests",
]

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
    "data", "outputs", "analysis_output", "infra",
    "docs", "static", "templates", "*.ipynb",
]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "UP",
    "B",
    "SIM",
]
ignore = [
    "E501",
    "B008",
]

[tool.ruff.lint.per-file-ignores]
"**/tests/**"    = ["E501", "F401", "F811", "E402", "SIM105", "SIM108", "SIM117"]
"tests/**"       = ["E501", "F401", "F811", "E402", "SIM105", "SIM108", "SIM117"]
"**/*_config.py" = ["E402"]
"benchmark.py"   = ["T201"]
"tune_*.py"      = ["T201"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
