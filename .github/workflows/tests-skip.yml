name: Run Tests

# Mirror of tests.yml's paths-ignore as a positive paths filter. When a PR
# changes only docs/markdown/etc, tests.yml's heavy matrix is skipped — but
# branch protection still needs `tests-pass` to report. This workflow fires
# on exactly those paths and emits a green `tests-pass` check.
#
# The two trigger filters must stay mutually exclusive with tests.yml's
# paths-ignore. Update both files together.

on:
  pull_request:
    branches: [main]
    paths:
      - "**.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".gitignore"
      - "LICENSE*"
  push:
    branches: [main]
    paths:
      - "**.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".gitignore"
      - "LICENSE*"

jobs:
  tests-pass:
    name: tests-pass
    runs-on: ubuntu-latest
    steps:
      - run: echo "Skipped — docs-only change matched paths filter."
