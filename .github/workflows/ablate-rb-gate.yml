name: Ablate RB TD-gate

# Runs the three-way RB TD-gate ablation on the EC2 trainer. Mirrors
# train-ec2.yml's instance start + SSM flow, but invokes
# ``python batch/train.py --position RB --ablation rb-gate`` via a direct
# ``docker run`` (``ff-train`` on the instance only knows POS + SEED).
#
# Trigger manually via Actions UI → "Ablate RB TD-gate" → Run workflow.
# The decision table is printed to the Actions log and surfaced in the
# step summary.

on:
  workflow_dispatch:
    inputs:
      seed:
        description: "Random seed"
        default: "42"

concurrency:
  # Separate group from ``train-ec2`` so a new merge to main (which triggers
  # train-ec2 with cancel-in-progress: true) doesn't cancel an in-flight or
  # queued ablation. OS-level mutual exclusion on the instance is handled by
  # the flock on /var/lock/ff-train.lock inside the SSM shell below — if
  # train-ec2 is running, the ablation's flock -n fails with exit 2 and the
  # workflow reports that cleanly instead of silently queuing.
  group: ec2-diagnostic
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: ff-training

jobs:
  ablate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve instance ID
        id: inst
        run: |
          ID="${{ vars.EC2_TRAINER_INSTANCE_ID }}"
          if [ -z "$ID" ]; then
            echo "EC2_TRAINER_INSTANCE_ID repo variable is not set."
            exit 1
          fi
          echo "id=$ID" >> "$GITHUB_OUTPUT"

      - name: Resolve ECR image URI
        id: img
        run: |
          ACCT=$(aws sts get-caller-identity --query Account --output text)
          echo "uri=$ACCT.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest" >> "$GITHUB_OUTPUT"

      - name: Start instance (no-op if already running)
        run: |
          aws ec2 start-instances --instance-ids "${{ steps.inst.outputs.id }}" --region "$AWS_REGION" >/dev/null
          aws ec2 wait instance-running --instance-ids "${{ steps.inst.outputs.id }}" --region "$AWS_REGION"

      - name: Wait for SSM agent online
        run: |
          for i in $(seq 1 30); do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${{ steps.inst.outputs.id }}" \
              --region "$AWS_REGION" \
              --query 'InstanceInformationList[0].PingStatus' --output text 2>/dev/null || echo "None")
            if [ "$STATUS" = "Online" ]; then
              echo "SSM online"
              exit 0
            fi
            echo "SSM status: $STATUS (attempt $i/30)"
            sleep 10
          done
          echo "Timed out waiting for SSM"
          exit 1

      - name: Verify bootstrap breadcrumb
        run: |
          CMD_ID=$(aws ssm send-command \
            --targets "Key=InstanceIds,Values=${{ steps.inst.outputs.id }}" \
            --document-name AWS-RunShellScript \
            --parameters 'commands=["test -f /opt/ff/config/bootstrap-complete && cat /opt/ff/config/bootstrap-complete"]' \
            --region "$AWS_REGION" --query Command.CommandId --output text)
          aws ssm wait command-executed \
            --command-id "$CMD_ID" \
            --instance-id "${{ steps.inst.outputs.id }}" \
            --region "$AWS_REGION"

      - name: Run ablation via docker
        id: ablate
        run: |
          SEED="${{ github.event.inputs.seed || '42' }}"
          IMAGE="${{ steps.img.outputs.uri }}"
          # Compose the docker run with the same env + mounts ff-train uses
          # (see infra/ec2/user-data.sh), but override the --ablation flag
          # and let the entrypoint (python batch/train.py) pick it up.
          # flock against the ff-train lock so a training run can't start
          # mid-ablation.
          jq -n --arg cmd "set -eu
          exec 200>/var/lock/ff-train.lock
          flock -n 200 || { echo 'ablate-rb-gate: ff-train lock held by another run'; exit 2; }
          mkdir -p /opt/ff/scratch/input /opt/ff/scratch/model /opt/ff/scratch/raw /opt/ff/logs
          date -Iseconds > /opt/ff/logs/last-activity
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin \$(echo '$IMAGE' | cut -d/ -f1) >/dev/null
          docker pull '$IMAGE'
          docker run --rm --gpus all \
            -e S3_BUCKET=ff-predictor-training \
            -e S3_DATA_PREFIX=data \
            -e LOG_EVERY=1 \
            -e REQUIRE_GPU=1 \
            -e AWS_DEFAULT_REGION=$AWS_REGION \
            -v /opt/ff/scratch/input:/opt/ml/input/data/training \
            -v /opt/ff/scratch/model:/opt/ml/model \
            -v /opt/ff/scratch/raw:/opt/ml/code/data/raw \
            '$IMAGE' --position RB --ablation rb-gate --seed $SEED 2>&1 | tee -a /var/log/ff-train/rb-ablate.log
          date -Iseconds > /opt/ff/logs/last-activity
          " '{commands: [$cmd]}' > /tmp/ssm-params.json
          CMD_ID=$(aws ssm send-command \
            --targets "Key=InstanceIds,Values=${{ steps.inst.outputs.id }}" \
            --document-name AWS-RunShellScript \
            --comment "ablate-rb-gate ${{ github.sha }}" \
            --parameters file:///tmp/ssm-params.json \
            --cloud-watch-output-config "CloudWatchLogGroupName=/ff/training,CloudWatchOutputEnabled=true" \
            --region "$AWS_REGION" --query Command.CommandId --output text)
          echo "command_id=$CMD_ID" >> "$GITHUB_OUTPUT"
          echo "Ablation command: $CMD_ID"

      - name: Wait for ablation to complete
        run: |
          # Manual poll. ``aws ssm wait command-executed`` has a 100s cap that
          # AWS_MAX_ATTEMPTS doesn't override — three RB pipeline runs take
          # ~10 min, so we poll ourselves against a 45 min deadline.
          CMD_ID="${{ steps.ablate.outputs.command_id }}"
          INST="${{ steps.inst.outputs.id }}"
          deadline=$(( $(date +%s) + 2700 ))
          while [ "$(date +%s)" -lt "$deadline" ]; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INST" \
              --region "$AWS_REGION" \
              --query Status --output text)
            case "$STATUS" in
              Success)                    echo "Ablation succeeded"; exit 0 ;;
              Cancelled|TimedOut|Failed)  echo "Ablation terminal: $STATUS"; exit 1 ;;
              Pending|InProgress|Delayed) echo "Status: $STATUS -- sleeping 20s"; sleep 20 ;;
              *)                          echo "Unknown status: $STATUS"; exit 1 ;;
            esac
          done
          echo "Timed out after 45 min"
          exit 1

      - name: Cancel SSM command on cancel/failure
        if: (cancelled() || failure()) && steps.ablate.outputs.command_id != ''
        run: |
          aws ssm cancel-command \
            --command-id "${{ steps.ablate.outputs.command_id }}" \
            --instance-ids "${{ steps.inst.outputs.id }}" \
            --region "$AWS_REGION" || true

      - name: Stream ablation output to Actions log
        if: always()
        run: |
          OUT=$(aws ssm get-command-invocation \
            --command-id "${{ steps.ablate.outputs.command_id }}" \
            --instance-id "${{ steps.inst.outputs.id }}" \
            --region "$AWS_REGION" \
            --query StandardOutputContent --output text)
          echo "$OUT"
          # Surface the last ~40 lines in the step summary so the decision
          # table is easy to see without digging into log output.
          {
            echo '## RB TD-gate ablation — tail of output'
            echo '```'
            printf '%s\n' "$OUT" | tail -40
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
