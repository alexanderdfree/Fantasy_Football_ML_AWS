name: Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install ruff==0.15.0
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install torch (CPU wheels)
        run: pip install torch==2.11.0 --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Install nfl_data_py (no-deps, matches Dockerfile)
        run: pip install --no-cache-dir --no-deps nfl_data_py==0.3.3

      # data/raw/ is gitignored (28 MB of player stats). The pipeline_e2e +
      # regression tests load data/raw/schedules_2012_2025.parquet via
      # shared.weather_features and src.features.engineer. Fetch it from
      # nfl_data_py (same call as src/data/loader.load_raw_data) and cache
      # across CI runs since completed-season schedules don't change.
      - name: Cache schedule parquet across CI runs
        id: sched-cache
        uses: actions/cache@v4
        with:
          path: data/raw/schedules_2012_2025.parquet
          key: schedules-2012-2025-v1

      - name: Download schedule parquet via nfl_data_py (cache miss)
        if: steps.sched-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p data/raw
          python - <<'PY'
          import nfl_data_py as nfl
          sched = nfl.import_schedules(list(range(2012, 2026)))
          sched.to_parquet('data/raw/schedules_2012_2025.parquet')
          print(f'Wrote schedules: {len(sched)} rows')
          PY

      - name: Run tests
        run: >-
          python -m pytest
          tests/ QB/tests/ RB/tests/ WR/tests/ TE/tests/ K/tests/ DST/tests/ batch/tests/ shared/tests/
          -v
          --cov=src --cov=shared --cov=app
          --cov=QB --cov=RB --cov=WR --cov=TE --cov=K --cov=DST
          --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
