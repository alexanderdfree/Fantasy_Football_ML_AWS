name: Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Docs-only PRs no longer need a separate workflow to emit a green
# `tests-pass`: the `detect` job below strips docs files from the diff
# and emits an empty matrix when nothing else changed, the test job is
# skipped, and the `tests-pass` aggregator treats `skipped` as success.
# A previous `tests-skip.yml` covered this case via a positive paths
# filter — that file was removed in favor of unified detect handling.

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # pytorch CPU index hosts older numpy/etc; fall through to PyPI like pip does.
  UV_INDEX_STRATEGY: unsafe-best-match

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "requirements*.txt"
      - run: uv pip install --system ruff==0.15.0
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .

  detect:
    # Decide which shards to run so a PR touching only e.g. `src/qb/` doesn't
    # spin up all 7 shards. Mirrors train-ec2.yml's detect job in spirit:
    # global infrastructure changes fan out to all shards; per-position
    # changes scope down. Default to "all 7" on uncertainty.
    runs-on: ubuntu-latest
    outputs:
      shards: ${{ steps.scope.outputs.shards }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Need history to diff against the merge base / previous commit.
          fetch-depth: 0

      - id: scope
        env:
          EVENT: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -eu

          ALL='["QB","RB","WR","TE","K","DST","shared"]'

          # Resolve the diff base. PRs diff against the PR base SHA (the
          # merge target on main); pushes to main diff against HEAD~1.
          if [ "$EVENT" = "pull_request" ]; then
            BASE="$BASE_SHA"
          else
            BASE="HEAD~1"
          fi

          if ! git rev-parse --verify "$BASE" >/dev/null 2>&1; then
            echo "Cannot resolve base ($BASE) — defaulting to all shards."
            echo "shards=$ALL" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          files=$(git diff --name-only "$BASE" HEAD)
          echo "Changed files:"
          printf '  %s\n' $files

          # ---- Strip docs/markdown/license-only changes. ----
          # If the diff contains only docs files, no test shard needs to
          # run — emit an empty matrix and let `tests-pass` accept the
          # `skipped` result. Patterns mirror the old tests-skip.yml
          # paths filter, kept here as the single source of truth.
          DOCS_REGEX='(\.md$|^docs/|^\.github/ISSUE_TEMPLATE/|^\.gitignore$|^LICENSE)'
          non_docs=$(printf '%s\n' "$files" | grep -vE "$DOCS_REGEX" || true)
          if [ -z "$non_docs" ]; then
            echo "Only docs/markdown/license changed -> no shards needed."
            echo "shards=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Subsequent regex checks operate on the docs-stripped view so
          # a mixed PR (docs/ + src/qb/) scopes to QB without the docs
          # files spuriously triggering anything.
          files="$non_docs"

          # ---- Global triggers — run all 7 shards. ----
          # src/shared/                    -> imported by every position
          # src/{data,features,models,training,evaluation}/ -> shared infra
          # src/__init__.py | src/config.py
          # conftest.py (root)             -> sys.path + marker registration
          # tests/conftest.py              -> shared Flask + tiny-model fixtures
          # tests/_pipeline_e2e_utils.py   -> imported by every position e2e
          # tests/__init__.py | tests/fixtures/
          # pyproject.toml                 -> ruff/pytest/coverage config
          # requirements*.txt              -> dep changes affect every shard
          # .github/workflows/tests.yml    -> the workflow itself
          GLOBAL_REGEX='^(src/(shared|data|features|models|training|evaluation)/|src/(__init__|config)\.py$|conftest\.py$|tests/(conftest\.py|_pipeline_e2e_utils\.py|__init__\.py|fixtures/)|pyproject\.toml$|requirements.*\.txt$|\.github/workflows/tests\.yml$)'
          if printf '%s\n' "$files" | grep -qE "$GLOBAL_REGEX"; then
            echo "Global file changed -> running all 7 shards."
            echo "shards=$ALL" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ---- Per-position scoping. ----
          shards=""
          for pos in QB RB WR TE K DST; do
            pos_lower=$(echo "$pos" | tr '[:upper:]' '[:lower:]')
            if printf '%s\n' "$files" | grep -qE "^(src/${pos_lower}/|tests/${pos_lower}/)"; then
              shards="${shards:+$shards,}\"$pos\""
            fi
          done

          # ---- Shared shard. Runs whenever something the shared shard
          # actually covers changes:
          # - tests/*.py (root-level tests like test_app.py)
          # - tests/{batch,scripts,integration,shared}/
          # - src/{serving,batch,scripts,benchmarking,tuning,analysis}/
          #   (these don't affect per-position pipelines but their tests
          #   live in the shared shard).
          SHARED_REGEX='^(src/(serving|batch|scripts|benchmarking|tuning|analysis)/|tests/[^/]+\.py$|tests/(batch|scripts|integration|shared)/)'
          if printf '%s\n' "$files" | grep -qE "$SHARED_REGEX"; then
            shards="${shards:+$shards,}\"shared\""
          fi

          if [ -z "$shards" ]; then
            # The docs-strip step above already short-circuits pure-doc
            # diffs, so reaching here means a non-doc path changed but
            # didn't match any global / per-position / shared rule —
            # e.g. another workflow file, infra/, etc. Default to all 7
            # rather than silently skip a real change.
            echo "No matching shards — defaulting to all 7 (conservative)."
            echo "shards=$ALL" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Scoped shards: [$shards]"
          echo "shards=[$shards]" >> "$GITHUB_OUTPUT"

  test:
    needs: detect
    # The detect step always emits at least one shard for code changes (it
    # falls back to all 7 on uncertainty), but guard against an empty list
    # so a future detect-rule bug surfaces as a skip rather than a crash.
    if: needs.detect.outputs.shards != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(needs.detect.outputs.shards) }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "requirements*.txt"

      - name: Install dependencies
        run: uv pip install --system -r requirements-dev.txt

      - name: Install nfl_data_py (no-deps, matches Dockerfile)
        run: uv pip install --system --no-deps nfl_data_py==0.3.3

      # data/raw/ is gitignored (28 MB of player stats). The pipeline_e2e +
      # regression tests load data/raw/schedules_2012_2025.parquet via
      # src.shared.weather_features and src.features.engineer. Fetch it from
      # nfl_data_py (same call as src/data/loader.load_raw_data) and cache
      # across CI runs since completed-season schedules don't change.
      - name: Cache schedule parquet across CI runs
        id: sched-cache
        uses: actions/cache@v5
        with:
          path: data/raw/schedules_2012_2025.parquet
          key: schedules-2012-2025-v1

      - name: Download schedule parquet via nfl_data_py (cache miss)
        if: steps.sched-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p data/raw
          python - <<'PY'
          import nfl_data_py as nfl
          sched = nfl.import_schedules(list(range(2012, 2026)))
          sched.to_parquet('data/raw/schedules_2012_2025.parquet')
          print(f'Wrote schedules: {len(sched)} rows')
          PY

      - name: Resolve shard test paths and coverage flags
        id: shard
        run: |
          shard="${{ matrix.shard }}"
          if [ "$shard" = "shared" ]; then
            # tests/ root + shared/batch/scripts; explicitly ignore the
            # per-position dirs covered by their own matrix shards so we
            # don't double-run them.
            echo "paths=tests/ --ignore=tests/qb --ignore=tests/rb --ignore=tests/wr --ignore=tests/te --ignore=tests/k --ignore=tests/dst" >> "$GITHUB_OUTPUT"
            echo "cov=--cov=src" >> "$GITHUB_OUTPUT"
          else
            shard_lower=$(echo "$shard" | tr '[:upper:]' '[:lower:]')
            echo "paths=tests/${shard_lower}/" >> "$GITHUB_OUTPUT"
            echo "cov=--cov=src.${shard_lower} --cov=src" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        run: >-
          python -m pytest
          ${{ steps.shard.outputs.paths }}
          -n auto --dist=loadfile
          --durations=15
          ${{ steps.shard.outputs.cov }}
          --cov-report=xml:coverage-${{ matrix.shard }}.xml
          --junitxml=junit-${{ matrix.shard }}.xml

      # Pre-trust the Codecov CLI signing key so `gpg --verify` inside
      # codecov-action doesn't emit "WARNING: This key is not certified
      # with a trusted signature!" on every upload. The action imports the
      # key but never assigns ownertrust; we do that here once per job.
      - name: Trust Codecov CLI verification key
        run: |
          set -euo pipefail
          KEY=$(curl -fsSL https://keybase.io/codecovsecurity/pgp_keys.asc)
          echo "$KEY" | gpg --import
          FPR=$(echo "$KEY" | gpg --show-keys --with-colons | awk -F: '/^fpr:/ {print $10; exit}')
          echo "${FPR}:6:" | gpg --import-ownertrust

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-${{ matrix.shard }}.xml
          flags: ${{ matrix.shard }}
          report_type: coverage
          disable_search: true
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./junit-${{ matrix.shard }}.xml
          flags: ${{ matrix.shard }}
          report_type: test_results
          disable_search: true
          fail_ci_if_error: false

  # Single aggregator check for branch protection. `detect` emits an empty
  # matrix when only docs/markdown/license files changed, so the `test`
  # job is skipped and this aggregator reports green without running any
  # shard. Branch protection should require `tests-pass` instead of the
  # individual shard names.
  tests-pass:
    name: tests-pass
    runs-on: ubuntu-latest
    needs: [lint, detect, test]
    if: always()
    steps:
      - name: Aggregate matrix result
        run: |
          # `test.result` is "success" when all matrix entries pass and
          # "skipped" when detect narrowed the matrix to zero shards (or a
          # future detect-rule bug). Both are acceptable; we only fail
          # `tests-pass` on a real lint or matrix failure. `detect` itself
          # must succeed — a detect failure means we cannot trust the
          # matrix decision.
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "::error::lint failed: ${{ needs.lint.result }}"
            exit 1
          fi
          if [[ "${{ needs.detect.result }}" != "success" ]]; then
            echo "::error::detect failed: ${{ needs.detect.result }}"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" != "success" && "${{ needs.test.result }}" != "skipped" ]]; then
            echo "::error::test matrix failed: ${{ needs.test.result }}"
            exit 1
          fi
          echo "All required jobs passed (test=${{ needs.test.result }})."
