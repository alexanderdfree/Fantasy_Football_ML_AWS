name: Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # pytorch CPU index hosts older numpy/etc; fall through to PyPI like pip does.
  UV_INDEX_STRATEGY: unsafe-best-match

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "requirements*.txt"
          python-version: "3.12"
      - run: uv pip install --system ruff==0.15.0
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [QB, RB, WR, TE, K, DST, shared]

    steps:
      - uses: actions/checkout@v6

      - name: Set up uv + Python 3.12
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "requirements*.txt"
          python-version: "3.12"

      - name: Install dependencies
        run: uv pip install --system -r requirements-dev.txt

      - name: Install nfl_data_py (no-deps, matches Dockerfile)
        run: uv pip install --system --no-deps nfl_data_py==0.3.3

      # data/raw/ is gitignored (28 MB of player stats). The pipeline_e2e +
      # regression tests load data/raw/schedules_2012_2025.parquet via
      # shared.weather_features and src.features.engineer. Fetch it from
      # nfl_data_py (same call as src/data/loader.load_raw_data) and cache
      # across CI runs since completed-season schedules don't change.
      - name: Cache schedule parquet across CI runs
        id: sched-cache
        uses: actions/cache@v5
        with:
          path: data/raw/schedules_2012_2025.parquet
          key: schedules-2012-2025-v1

      - name: Download schedule parquet via nfl_data_py (cache miss)
        if: steps.sched-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p data/raw
          python - <<'PY'
          import nfl_data_py as nfl
          sched = nfl.import_schedules(list(range(2012, 2026)))
          sched.to_parquet('data/raw/schedules_2012_2025.parquet')
          print(f'Wrote schedules: {len(sched)} rows')
          PY

      - name: Resolve shard test paths and coverage flags
        id: shard
        run: |
          if [ "${{ matrix.shard }}" = "shared" ]; then
            echo "paths=tests/ batch/tests/ shared/tests/" >> "$GITHUB_OUTPUT"
            echo "cov=--cov=src --cov=shared --cov=app --cov=batch" >> "$GITHUB_OUTPUT"
          else
            echo "paths=${{ matrix.shard }}/tests/" >> "$GITHUB_OUTPUT"
            echo "cov=--cov=src --cov=${{ matrix.shard }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        run: >-
          python -m pytest
          ${{ steps.shard.outputs.paths }}
          -v
          ${{ steps.shard.outputs.cov }}
          --cov-report=xml:coverage-${{ matrix.shard }}.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage-${{ matrix.shard }}.xml
          flags: ${{ matrix.shard }}
          fail_ci_if_error: false
