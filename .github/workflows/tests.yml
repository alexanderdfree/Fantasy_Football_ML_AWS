name: Run Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".gitignore"
      - "LICENSE*"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".gitignore"
      - "LICENSE*"

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # pytorch CPU index hosts older numpy/etc; fall through to PyPI like pip does.
  UV_INDEX_STRATEGY: unsafe-best-match

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "requirements*.txt"
      - run: uv pip install --system ruff==0.15.0
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .

  # Build the test venv once and hand it to every shard as an artifact. Each
  # shard used to redundantly run `uv pip install -r requirements-dev.txt`
  # (~15-20s of wheel extraction even with the uv cache warm). With 7 shards
  # that was ~2 minutes of compute per CI run burned on the same install.
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "requirements*.txt"
      - name: Create venv and install test deps
        run: |
          uv venv --python 3.12 --copies ./venv
          uv pip install --python ./venv/bin/python -r requirements-dev.txt
          # nfl_data_py pulls old numpy/pandas if its deps resolve; install
          # without dependencies (matches batch/Dockerfile.train line 38).
          uv pip install --python ./venv/bin/python --no-deps nfl_data_py==0.3.3
      - name: Tar venv
        # Pre-tar into one file. upload-artifact pays per-file metadata overhead
        # that dominates for Python site-packages (thousands of small files).
        run: tar -cf venv.tar venv
      - name: Upload venv artifact
        uses: actions/upload-artifact@v4
        with:
          name: venv
          path: venv.tar
          retention-days: 1
          # The tar already holds compressed wheels and binaries; skip zip-level
          # re-compression so upload isn't CPU-bound for no size win.
          compression-level: 0

  test:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [QB, RB, WR, TE, K, DST, shared]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        # Still needed: the venv's python binary (built with --copies) still
        # links to libpython3.12 at runtime. setup-python populates the
        # hosttoolcache path the venv expects; instant on warm runners.
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download venv artifact
        uses: actions/download-artifact@v4
        with:
          name: venv

      - name: Extract venv
        run: tar -xf venv.tar

      # data/raw/ is gitignored (28 MB of player stats). The pipeline_e2e +
      # regression tests load data/raw/schedules_2012_2025.parquet via
      # shared.weather_features and src.features.engineer. Fetch it from
      # nfl_data_py (same call as src/data/loader.load_raw_data) and cache
      # across CI runs since completed-season schedules don't change.
      - name: Cache schedule parquet across CI runs
        id: sched-cache
        uses: actions/cache@v5
        with:
          path: data/raw/schedules_2012_2025.parquet
          key: schedules-2012-2025-v1

      - name: Download schedule parquet via nfl_data_py (cache miss)
        if: steps.sched-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p data/raw
          ./venv/bin/python - <<'PY'
          import nfl_data_py as nfl
          sched = nfl.import_schedules(list(range(2012, 2026)))
          sched.to_parquet('data/raw/schedules_2012_2025.parquet')
          print(f'Wrote schedules: {len(sched)} rows')
          PY

      - name: Resolve shard test paths and coverage flags
        id: shard
        run: |
          if [ "${{ matrix.shard }}" = "shared" ]; then
            echo "paths=tests/ batch/tests/ shared/tests/" >> "$GITHUB_OUTPUT"
            echo "cov=--cov=src --cov=shared --cov=app --cov=batch" >> "$GITHUB_OUTPUT"
          else
            echo "paths=${{ matrix.shard }}/tests/" >> "$GITHUB_OUTPUT"
            echo "cov=--cov=src --cov=${{ matrix.shard }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        run: >-
          ./venv/bin/python -m pytest
          ${{ steps.shard.outputs.paths }}
          -n auto --dist=loadfile
          ${{ steps.shard.outputs.cov }}
          --cov-report=xml:coverage-${{ matrix.shard }}.xml
          --junitxml=junit-${{ matrix.shard }}.xml

      # Pre-trust the Codecov CLI signing key so `gpg --verify` inside
      # codecov-action doesn't emit "WARNING: This key is not certified
      # with a trusted signature!" on every upload. The action imports the
      # key but never assigns ownertrust; we do that here once per job.
      - name: Trust Codecov CLI verification key
        run: |
          set -euo pipefail
          KEY=$(curl -fsSL https://keybase.io/codecovsecurity/pgp_keys.asc)
          echo "$KEY" | gpg --import
          FPR=$(echo "$KEY" | gpg --show-keys --with-colons | awk -F: '/^fpr:/ {print $10; exit}')
          echo "${FPR}:6:" | gpg --import-ownertrust

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-${{ matrix.shard }}.xml
          flags: ${{ matrix.shard }}
          report_type: coverage
          disable_search: true
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./junit-${{ matrix.shard }}.xml
          flags: ${{ matrix.shard }}
          report_type: test_results
          disable_search: true
          fail_ci_if_error: false
