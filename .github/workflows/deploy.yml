name: Deploy to ECS

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: fantasy-predictor
  ECS_CLUSTER: fantasy-cluster
  ECS_SERVICE: fantasy-service
  TASK_FAMILY: fantasy-predictor

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install torch (CPU wheels)
        run: pip install torch==2.11.0 --index-url https://download.pytorch.org/whl/cpu
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Install nfl_data_py (no-deps, matches Dockerfile)
        run: pip install --no-cache-dir --no-deps nfl_data_py==0.3.3
      - name: Install boto3 (for batch/tests/test_launch.py)
        run: pip install --no-cache-dir boto3
      - name: Run tests
        run: |
          python -m pytest tests/ QB/tests/ RB/tests/ WR/tests/ TE/tests/ K/tests/ DST/tests/ batch/tests/ shared/tests/ -v \
            --ignore-glob='**/test_*_pipeline_e2e.py' \
            --ignore-glob='**/test_*_regression.py' \
            --ignore=batch/tests/test_train.py

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync data splits + model artifacts from S3 (gitignored, needed in image)
        run: |
          set -e
          mkdir -p data/splits data/raw
          aws s3 cp s3://ff-predictor-training/data/test.parquet  data/splits/test.parquet
          aws s3 cp s3://ff-predictor-training/data/train.parquet data/splits/train.parquet
          aws s3 cp s3://ff-predictor-training/data/val.parquet   data/splits/val.parquet
          aws s3 sync s3://ff-predictor-training/data/raw/ data/raw/ --exclude "*_2023_2023.parquet"
          for pos in QB RB WR TE K DST; do
            mkdir -p "$pos/outputs/models"
            aws s3 cp "s3://ff-predictor-training/models/$pos/model.tar.gz" "/tmp/$pos-model.tar.gz"
            tar -xzf "/tmp/$pos-model.tar.gz" -C "$pos/outputs/models/"
            rm "/tmp/$pos-model.tar.gz"
          done

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, tag, push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --provenance=false \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --push .

      - name: Deploy to ECS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          TASK_DEF=$(aws ecs describe-task-definition --task-definition $TASK_FAMILY --query taskDefinition)
          NEW_TASK_DEF=$(echo $TASK_DEF | jq \
            --arg IMG "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            '.containerDefinitions[0].image = $IMG |
             del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)')
          NEW_REV=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.revision' --output text)
          echo "Registered task definition $TASK_FAMILY:$NEW_REV"
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition $TASK_FAMILY:$NEW_REV \
            --force-new-deployment

      - name: Wait for ECS rollout
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE
