name: Deploy to ECS

on:
  push:
    branches: [main]
    # Only redeploy Flask when the serving surface actually changes. Training-
    # only edits (batch/**, QB/qb_config.py, etc.) don't need a new task
    # revision. shared/** is in because app.py imports from it; if that ever
    # splits into shared/serving/ vs shared/training/, narrow this filter.
    paths:
      - "app.py"
      - "templates/**"
      - "static/**"
      - "src/**"
      - "shared/**"
      - "Dockerfile"
      - "requirements.txt"
      - ".github/workflows/deploy.yml"

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: fantasy-predictor
  ECS_CLUSTER: fantasy-cluster
  ECS_SERVICE: fantasy-service
  TASK_FAMILY: fantasy-predictor

jobs:
  # Tests run in tests.yml (matrix across positions). Branch protection on
  # main requires those checks to pass before a PR can merge, so we trust
  # the merged SHA here and go straight to the ECS rollout.
  deploy:
    # Native arm64 runner — the serving image targets linux/arm64, so running
    # on Ampere/Cobalt avoids QEMU emulation (was ~3-5x slower for Python C
    # extension installs).
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Local cache backend persists BuildKit `--mount=type=cache` directories
      # (uv's wheel cache in the Dockerfile) across CI runs. The gha backend
      # persists layer cache reliably but not cache mounts
      # (moby/buildkit#1512), so we run both in parallel — same pattern as
      # batch-image.yml.
      - name: Cache BuildKit state
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ runner.os }}-${{ hashFiles('requirements.txt', 'Dockerfile') }}
          restore-keys: |
            buildx-${{ runner.os }}-

      - name: Build, tag, push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --provenance=false \
            --cache-from type=gha \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=gha,mode=max \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --push .

      # Swap caches so actions/cache stores the freshly-written one on
      # post-job save, rather than the (now stale) input cache.
      - name: Move BuildKit cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Pull current task definition
        run: |
          aws ecs describe-task-definition --task-definition $TASK_FAMILY \
            --query 'taskDefinition' --output json \
          | jq 'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)' \
          > task-definition.json

      - name: Update image in task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: fantasy-predictor
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 20
          force-new-deployment: true
