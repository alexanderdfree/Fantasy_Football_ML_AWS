name: Train on EC2

# Active training path — fires after batch-image.yml pushes a fresh image to
# ECR, then sends an SSM Run Command to the warm g4dn.xlarge. See
# docs/ec2_design.md.

on:
  workflow_run:
    workflows: ["Build & Push Batch Training Image"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      positions:
        description: "Space-separated positions to train"
        default: "QB RB WR TE K DST"
      seed:
        description: "Random seed"
        default: "42"

concurrency:
  group: train-ec2
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  S3_BUCKET: ff-predictor-training

jobs:
  detect:
    # Decide which positions to train so we don't burn GPU time on positions
    # whose code didn't change. workflow_dispatch honors the explicit input
    # (break-glass); workflow_run scopes via git diff on the merge commit.
    # Keep the global-trigger list in sync with batch-image.yml's path filter.
    runs-on: ubuntu-latest
    outputs:
      positions: ${{ steps.scope.outputs.positions }}
    steps:
      - uses: actions/checkout@v6
        with:
          # workflow_run: the merged SHA on main. workflow_dispatch: the
          # ref we were dispatched on. fetch-depth: 2 is the minimum to
          # resolve HEAD^ for git diff.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      - id: scope
        env:
          EVENT: ${{ github.event_name }}
          INPUT_POSITIONS: ${{ github.event.inputs.positions }}
        run: |
          set -eu
          ALL="QB RB WR TE K DST"

          # Dispatch with explicit input → use verbatim (break-glass).
          # Dispatch with empty input → retrain all (legacy semantics,
          # e.g. "retrain after data refresh").
          if [ "$EVENT" = "workflow_dispatch" ]; then
            if [ -n "$INPUT_POSITIONS" ]; then
              echo "Dispatch override: $INPUT_POSITIONS"
              echo "positions=$INPUT_POSITIONS" >> "$GITHUB_OUTPUT"
            else
              echo "Dispatch with empty input → all positions."
              echo "positions=$ALL" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          # workflow_run: diff the merged commit against its first parent.
          # Defensive: on a degenerate repo with no parent, default to all.
          if ! git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            echo "No parent commit — defaulting to all positions."
            echo "positions=$ALL" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          files=$(git diff --name-only HEAD^ HEAD)
          echo "Changed files:"
          printf '  %s\n' $files

          # Strip the tests/ subtree before scoping. A PR that only edits
          # tests/ does not affect model artifacts, so the global + per-position
          # checks below operate on a tests-free view of the diff. `|| true`
          # keeps the step alive when grep -v has nothing left to print.
          model_files=$(printf '%s\n' "$files" | grep -vE '^tests/' || true)
          echo "Model-relevant changed files:"
          printf '  %s\n' $model_files

          # Global triggers → retrain everything. Must match batch-image.yml's
          # path filter; src/shared/, src/batch/, src/config.py, src/data/,
          # src/features/, src/models/, src/training/, src/evaluation/ all
          # change shared signal, so a touch anywhere there retrains all.
          if printf '%s\n' "$model_files" | grep -qE '^src/(shared|batch|data|features|models|training|evaluation)/|^src/config\.py$|^requirements\.txt$'; then
            echo "Global code changed → retraining all positions."
            echo "positions=$ALL" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Per-position: any non-test change under src/{pos}/ retrains that
          # position. Docs and markdown still trigger retraining (cheap);
          # the narrower filter above is scoped to tests/ only. Position dirs
          # are lowercase on disk; lowercase $p with ${p,,} for the path match.
          positions=""
          for p in $ALL; do
            if printf '%s\n' "$model_files" | grep -qE "^src/${p,,}/"; then
              positions="${positions:+$positions }$p"
            fi
          done

          if [ -z "$positions" ]; then
            echo "No model-relevant paths changed — skipping training."
          else
            echo "Scoped retrain: $positions"
          fi
          echo "positions=$positions" >> "$GITHUB_OUTPUT"

  train:
    needs: detect
    # Gate: (a) detect found something to train, AND (b) the event is a
    # manual dispatch or a successful upstream image build. Dispatches
    # always satisfy (a) via the legacy fallback in detect.
    if: >
      needs.detect.outputs.positions != '' &&
      (github.event_name == 'workflow_dispatch' ||
       github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          fetch-depth: 0
          # Admin PAT so the later benchmark-history push bypasses main's
          # required status checks (enforce_admins=false on classic protection).
          token: ${{ secrets.PROTECTED_PUSH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install history-update deps
        # requirements-dev.txt, not requirements.txt: src/batch/benchmark.py's
        # import chain (src.batch.launch → src.shared.registry → src.shared.aggregate_targets)
        # pulls torch since cc0c627 added the attention NN. Mirrors tests.yml.
        run: pip install -r requirements-dev.txt

      - name: Resolve instance ID
        id: inst
        run: |
          ID="${{ vars.EC2_TRAINER_INSTANCE_ID }}"
          if [ -z "$ID" ]; then
            echo "EC2_TRAINER_INSTANCE_ID repo variable is not set. Run infra/ec2/launch-instance.sh first."
            exit 1
          fi
          echo "id=$ID" >> "$GITHUB_OUTPUT"

      - name: Start instance (no-op if already running)
        run: |
          aws ec2 start-instances --instance-ids "${{ steps.inst.outputs.id }}" --region "$AWS_REGION" >/dev/null
          aws ec2 wait instance-running --instance-ids "${{ steps.inst.outputs.id }}" --region "$AWS_REGION"

      - name: Wait for SSM agent online
        run: |
          for i in $(seq 1 30); do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${{ steps.inst.outputs.id }}" \
              --region "$AWS_REGION" \
              --query 'InstanceInformationList[0].PingStatus' --output text 2>/dev/null || echo "None")
            if [ "$STATUS" = "Online" ]; then
              echo "SSM online"
              exit 0
            fi
            echo "SSM status: $STATUS (attempt $i/30)"
            sleep 10
          done
          echo "Timed out waiting for SSM"
          exit 1

      - name: Verify bootstrap breadcrumb
        run: |
          CMD_ID=$(aws ssm send-command \
            --targets "Key=InstanceIds,Values=${{ steps.inst.outputs.id }}" \
            --document-name AWS-RunShellScript \
            --parameters 'commands=["test -f /opt/ff/config/bootstrap-complete && cat /opt/ff/config/bootstrap-complete"]' \
            --region "$AWS_REGION" --query Command.CommandId --output text)
          aws ssm wait command-executed \
            --command-id "$CMD_ID" \
            --instance-id "${{ steps.inst.outputs.id }}" \
            --region "$AWS_REGION"
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "${{ steps.inst.outputs.id }}" \
            --region "$AWS_REGION" \
            --query StandardOutputContent --output text

      - name: Run training for all positions (sequential)
        id: train
        run: |
          POSITIONS="${{ needs.detect.outputs.positions }}"
          SEED="${{ github.event.inputs.seed || '42' }}"
          # Sequential loop inside a single SSM command so we get one command
          # ID to poll. Parallel runs would OOM the single T4.
          # Positions are letters only — safe to interpolate unquoted in the
          # remote shell. JSON-encode via jq so quoting can't bite us.
          jq -n --arg cmd "set -eu; for POS in $POSITIONS; do /usr/local/bin/ff-train \$POS $SEED; done" \
            '{commands: [$cmd]}' > /tmp/ssm-params.json
          CMD_ID=$(aws ssm send-command \
            --targets "Key=InstanceIds,Values=${{ steps.inst.outputs.id }}" \
            --document-name AWS-RunShellScript \
            --comment "train-ec2 ${{ github.sha }}" \
            --parameters file:///tmp/ssm-params.json \
            --cloud-watch-output-config "CloudWatchLogGroupName=/ff/training,CloudWatchOutputEnabled=true" \
            --region "$AWS_REGION" --query Command.CommandId --output text)
          echo "command_id=$CMD_ID" >> "$GITHUB_OUTPUT"
          echo "Training command: $CMD_ID"

      - name: Wait for training to complete
        run: |
          # Manual poll loop. `aws ssm wait command-executed` has a hard-coded
          # 20-attempt x 5s cap (~100s) that AWS_MAX_ATTEMPTS / --cli-read-timeout
          # don't override, so long runs were being reported as failures even
          # though the SSM command succeeded on the instance.
          CMD_ID="${{ steps.train.outputs.command_id }}"
          INST="${{ steps.inst.outputs.id }}"
          deadline=$(( $(date +%s) + 1800 ))
          while [ "$(date +%s)" -lt "$deadline" ]; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INST" \
              --region "$AWS_REGION" \
              --query Status --output text)
            case "$STATUS" in
              Success)                    echo "Training succeeded"; exit 0 ;;
              Cancelled|TimedOut|Failed)  echo "Training terminal: $STATUS"; exit 1 ;;
              Pending|InProgress|Delayed) echo "Status: $STATUS -- sleeping 15s"; sleep 15 ;;
              *)                          echo "Unknown status: $STATUS"; exit 1 ;;
            esac
          done
          echo "Timed out after 30 min"
          exit 1

      - name: Cancel SSM training command on cancel/failure
        if: (cancelled() || failure()) && steps.train.outputs.command_id != ''
        run: |
          # On GH cancel or local poll timeout, the SSM command keeps running
          # on the instance and its bash process keeps the /var/lock/ff-train.lock
          # flock held, blocking the next train run. Cancelling the SSM command
          # lets SSM terminate that bash process, which closes FD 200 and
          # releases the flock. `|| true` so an already-terminal command (cancel
          # returns non-zero) is a no-op.
          aws ssm cancel-command \
            --command-id "${{ steps.train.outputs.command_id }}" \
            --instance-ids "${{ steps.inst.outputs.id }}" \
            --region "$AWS_REGION" || true

      - name: Stream training output to Actions log
        if: always()
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.train.outputs.command_id }}" \
            --instance-id "${{ steps.inst.outputs.id }}" \
            --region "$AWS_REGION" \
            --query '{Status:Status,StdOut:StandardOutputContent,StdErr:StandardErrorContent}' \
            --output json

      - name: Verify model artifact freshness
        run: |
          POSITIONS="${{ needs.detect.outputs.positions }}"
          now=$(date +%s)
          echo "| Position | Status | LastModified | Size (MB) |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|--------|--------------|-----------|" >> "$GITHUB_STEP_SUMMARY"
          fail=0
          for POS in $POSITIONS; do
            META=$(aws s3api head-object \
              --bucket "$S3_BUCKET" \
              --key "models/$POS/model.tar.gz" \
              --region "$AWS_REGION" 2>/dev/null || echo '{}')
            LM=$(echo "$META" | jq -r '.LastModified // empty')
            SZ=$(echo "$META" | jq -r '.ContentLength // 0')
            if [ -z "$LM" ]; then
              echo "| $POS | MISSING | — | — |" >> "$GITHUB_STEP_SUMMARY"
              fail=1
              continue
            fi
            lm_ts=$(date -d "$LM" +%s)
            age=$(( now - lm_ts ))
            status="OK"
            if [ "$age" -gt 1200 ]; then status="STALE (${age}s old)"; fail=1; fi
            mb=$(awk "BEGIN{printf \"%.1f\", $SZ/1048576}")
            echo "| $POS | $status | $LM | $mb |" >> "$GITHUB_STEP_SUMMARY"
          done
          exit $fail

      - name: Append EC2 run to benchmark_history/
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch || github.ref_name }}"
          POSITIONS="${{ needs.detect.outputs.positions }}"
          # Rebase before appending so a concurrent push doesn't reject us later.
          git fetch origin "$BRANCH"
          git pull --rebase origin "$BRANCH"
          python -m src.batch.benchmark \
            --download-only \
            --backend ec2 \
            --instance-type "g4dn.xlarge (On-Demand)" \
            --positions $POSITIONS \
            --note "EC2 auto-run (${GITHUB_SHA::7})"

      - name: Commit and push benchmark_history/
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch || github.ref_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add benchmark_history/
          if git diff --cached --quiet -- benchmark_history/; then
            echo "No history changes — skipping commit."
            exit 0
          fi
          staged=$(git diff --cached --name-only)
          unexpected=$(echo "$staged" | grep -v '^benchmark_history/' || true)
          if [ -n "$unexpected" ]; then
            echo "ERROR: unexpected staged paths (expected benchmark_history/ only):"
            echo "$unexpected"
            exit 1
          fi
          git commit -m "chore(ci): append EC2 benchmark run ${GITHUB_SHA::7}"
          for attempt in 1 2 3; do
            if git push origin HEAD:"refs/heads/$BRANCH"; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed — rebasing and retrying"
            git pull --rebase origin "$BRANCH"
          done
          echo "Push failed after 3 attempts"
          exit 1
